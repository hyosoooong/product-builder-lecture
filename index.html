<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기 (5게임)</title>
    <style>
        /* CSS 변수 설정 */
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333;
            --sub-text-color: #888;
            --row-bg: #fcfcfc;
            --row-border: #eee;
            --button-bg: #4CAF50;
            --button-hover: #45a049;
            --shadow: rgba(0,0,0,0.1);
            --input-focus: #4CAF50;
        }

        /* 다크 모드 변수 */
        .dark-mode {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --sub-text-color: #aaa;
            --row-bg: #383838;
            --row-border: #444;
            --button-bg: #388E3C;
            --button-hover: #2E7D32;
            --shadow: rgba(0,0,0,0.5);
            --input-focus: #81C784;
        }

        /* 전체 페이지 스타일 설정 */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 메인 컨테이너 */
        .container {
            background-color: var(--container-bg);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px var(--shadow);
            text-align: center;
            max-width: 550px;
            width: 100%;
            position: relative;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 30px;
            font-size: 28px;
        }

        /* 모드 전환 버튼 스타일 */
        .mode-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: 1px solid var(--row-border);
            color: var(--text-color);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
        }

        .mode-toggle:hover {
            background-color: var(--row-bg);
        }

        /* 5게임 전체를 담는 영역 */
        #games-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* 1게임(1줄) 영역 */
        .game-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background-color: var(--row-bg);
            border-radius: 10px;
            border: 1px solid var(--row-border);
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        /* A, B, C, D, E 라벨 */
        .game-label {
            font-weight: bold;
            color: var(--sub-text-color);
            font-size: 18px;
            width: 25px;
        }

        /* 개별 로또 공 스타일 */
        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2), 1px 1px 3px rgba(0,0,0,0.1);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* 버튼 스타일 */
        .generate-btn {
            background-color: var(--button-bg);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .generate-btn:hover {
            background-color: var(--button-hover);
        }

        .generate-btn:active {
            transform: scale(0.97);
        }

        /* 제휴 문의 섹션 스타일 */
        .contact-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--row-border);
            text-align: left;
        }

        .contact-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-color);
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--row-border);
            border-radius: 8px;
            background-color: var(--row-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--input-focus);
        }

        .submit-btn {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #1976D2;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="mode-toggle" onclick="toggleDarkMode()" title="모드 전환">
            <span id="mode-icon">🌙</span>
        </button>
        <h1>행운의 로또 번호 추천기 🍀</h1>
        <div id="games-container"></div>
        <button class="generate-btn" onclick="generateMultipleLottoNumbers()">5게임 연속 뽑기</button>

        <!-- 제휴 문의 섹션 -->
        <div class="contact-section">
            <h2>제휴 문의 ✉️</h2>
            <form action="https://formspree.io/f/mlgoljgy" method="POST">
                <div class="form-group">
                    <label for="name">성함 / 업체명</label>
                    <input type="text" id="name" name="name" required placeholder="예: 홍길동">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" required placeholder="문의하실 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>
    </div>

    <script>
        // 다크 모드 토글 함수
        function toggleDarkMode() {
            const body = document.body;
            const icon = document.getElementById('mode-icon');
            
            body.classList.toggle('dark-mode');
            
            const isDarkMode = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            icon.textContent = isDarkMode ? '☀️' : '🌙';
        }

        // 초기 테마 설정 확인
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const icon = document.getElementById('mode-icon');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                icon.textContent = '☀️';
            }
        }

        // 1게임(6개 번호)을 생성하는 함수
        function generateSingleGame() {
            const numbers = new Set();
            while(numbers.size < 6) {
                const randomNum = Math.floor(Math.random() * 45) + 1;
                numbers.add(randomNum);
            }
            return Array.from(numbers).sort((a, b) => a - b);
        }

        // 번호에 따른 공 색상을 반환하는 함수
        function getBallColor(num) {
            if (num >= 1 && num <= 10) return '#fbc400'; // 노란색
            if (num >= 11 && num <= 20) return '#69c8f2'; // 파란색
            if (num >= 21 && num <= 30) return '#ff7272'; // 빨간색
            if (num >= 31 && num <= 40) return '#aaaaaa'; // 회색
            return '#b0d840'; // 녹색
        }

        // 5게임을 생성하고 화면에 그리는 함수
        function generateMultipleLottoNumbers() {
            const container = document.getElementById('games-container');
            container.innerHTML = ''; // 기존 번호 초기화

            const labels = ['A', 'B', 'C', 'D', 'E'];

            for (let i = 0; i < 5; i++) {
                const gameNumbers = generateSingleGame();
                const row = document.createElement('div');
                row.classList.add('game-row');

                const label = document.createElement('div');
                label.classList.add('game-label');
                label.textContent = labels[i];
                row.appendChild(label);

                gameNumbers.forEach(num => {
                    const ball = document.createElement('div');
                    ball.classList.add('ball');
                    ball.textContent = num;
                    ball.style.backgroundColor = getBallColor(num);
                    row.appendChild(ball);
                });

                container.appendChild(row);
            }
        }

        window.onload = () => {
            initTheme();
            generateMultipleLottoNumbers();
        };
    </script>

</body>
</html>
